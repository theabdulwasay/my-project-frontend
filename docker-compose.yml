# Local development & single-server deploy
# Usage: docker compose up --build
# Site:  http://localhost:8000

services:
  db:
    image: mysql:8.0
    container_name: wct-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-wah_tour_db}
      MYSQL_USER: ${DB_USER:-wah_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-wah_pass_change_me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass_change_me}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    ports:
      - "3307:3306"

  web:
    build: .
    container_name: wct-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME:-wah_tour_db}
      DB_USER: ${DB_USER:-wah_user}
      DB_PASSWORD: ${DB_PASSWORD:-wah_pass_change_me}
      SEED_ON_START: ${SEED_ON_START:-true}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
    ports:
      - "${WEB_PORT:-8000}:8000"
    volumes:
      - tour_uploads:/app/frontend/images/tours
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
  tour_uploads:
