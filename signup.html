<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Wah Cantt Coaster Tour</title>
    
    <!-- CSS links -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css?v=1.8">
    <link rel="stylesheet" href="/css/pages-public.css?v=2.0">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-medium) 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center;">

    <div style="width: 100%; max-width: 500px; padding: 20px;">
        <div style="background: white; padding: 50px 40px; border-radius: var(--border-radius); box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
            
            <!-- Header -->
            <div style="text-align: center; margin-bottom: 40px;">
                <a href="/" style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px;">
                    <div style="width: 45px; height: 45px; background: var(--primary-dark); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                        <i class="fa-solid fa-bus" style="color: white; font-size: 1.5em;"></i>
                    </div>
                    <div>
                        <div style="font-weight: 700; color: var(--primary-dark); font-size: 1.1em;">Wah Cantt</div>
                        <div style="font-size: 0.8em; color: var(--text-slate);">Coaster Tour</div>
                    </div>
                </a>
                <h2 style="font-size: 1.8em; color: var(--text-dark); margin-bottom: 10px;">Create Account</h2>
                <p style="color: var(--text-slate);">Join us and start your beautiful journey</p>
            </div>

            <!-- Signup Form -->
            <form onsubmit="handleSignup(event)">
                <div style="margin-bottom: 18px;">
                    <label style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-dark);">Full Name</label>
                    <input type="text" name="name" placeholder="Your full name" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: var(--border-radius); font-size: 1em;" required>
                </div>

                <div style="margin-bottom: 18px;">
                    <label style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-dark);">Email Address</label>
                    <input type="email" name="email" placeholder="your@email.com" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: var(--border-radius); font-size: 1em;" required>
                </div>

                <div style="margin-bottom: 18px;">
                    <label style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-dark);">Phone Number</label>
                    <input type="tel" name="phone" placeholder="0300-0000000" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: var(--border-radius); font-size: 1em;" required>
                </div>

                <div style="margin-bottom: 18px;">
                    <label style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-dark);">Password</label>
                    <input type="password" name="password" placeholder="Create a strong password" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: var(--border-radius); font-size: 1em;" required>
                </div>

                <div style="margin-bottom: 18px;">
                    <label style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-dark);">Confirm Password</label>
                    <input type="password" name="confirm_password" placeholder="Confirm your password" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: var(--border-radius); font-size: 1em;" required>
                </div>

                <div style="margin-bottom: 24px;">
                    <label style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer;">
                        <input type="checkbox" name="agree_terms" style="width: 18px; height: 18px; margin-top: 3px;" required>
                        <span style="color: var(--text-slate); font-size: 0.9em;">I agree to the Terms & Conditions and Privacy Policy</span>
                    </label>
                </div>

                <button type="submit" class="home-btn home-btn-primary" style="width: 100%; padding: 14px; font-size: 1.05em; margin-bottom: 20px;">
                    <i class="fa-solid fa-user-plus"></i> Create Account
                </button>
            </form>

            <!-- Divider -->
            <div style="display: flex; align-items: center; gap: 15px; margin: 30px 0;">
                <div style="flex: 1; height: 1px; background: #e2e8f0;"></div>
                <span style="color: var(--text-slate); font-size: 0.9em;">Already have an account?</span>
                <div style="flex: 1; height: 1px; background: #e2e8f0;"></div>
            </div>

            <!-- Login Link -->
            <a href="/login.html" class="home-btn home-btn-ghost" style="width: 100%; padding: 14px; text-align: center; display: block;">
                <i class="fa-solid fa-sign-in-alt"></i> Login Now
            </a>

            <p style="text-align: center; color: var(--text-slate); font-size: 0.85em; margin-top: 20px;">
                Your account helps you track bookings
            </p>
        </div>

        <!-- Contact Card -->
        <div style="background: rgba(46, 204, 113, 0.1); border: 2px solid rgba(46, 204, 113, 0.3); padding: 20px; border-radius: var(--border-radius); margin-top: 30px; text-align: center;">
            <p style="color: white; font-size: 0.9em; margin-bottom: 10px;">Need help?</p>
            <a href="tel:+923341944963" style="color: var(--accent-green); font-weight: 600; text-decoration: none;">Call 0334-1944963</a>
        </div>
    </div>

    <script defer src="/js/main.js?v=1.7"></script>
    <script>
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                const links = document.querySelectorAll('link[rel="stylesheet"]');
                links.forEach(link => {
                    link.href = link.href.split('?')[0] + '?v=' + Date.now();
                });
            }
        });

        function handleSignup(e) {
            e.preventDefault();
            const password = e.target.password.value;
            const confirmPassword = e.target.confirm_password.value;
            
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }
            
            alert('Account created successfully! You can now login.');
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
                    <input type="password" name="password" id="password" class="form-control" placeholder="Create a password" required>
                </div>

                <div class="form-group" style="margin-bottom: 25px;">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" name="confirm_password" id="confirm_password" class="form-control" placeholder="Confirm your password" required>
                </div>

                <button type="submit" class="btn-auth-submit">
                    <i class="fa-solid fa-user-plus"></i> Sign Up
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/login.html" class="auth-link">Login</a>
            </div>
        </div>
    </div>
{% endblock %}
